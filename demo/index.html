<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crompressor WASM Demo</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.3);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .container {
            width: 100%;
            max-width: 720px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: border-color 0.3s;
        }

        .card:hover { border-color: var(--accent); }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 3rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-muted);
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-glow);
            color: var(--text);
        }

        .drop-zone input { display: none; }

        .btn {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: transform 0.15s, box-shadow 0.3s;
            width: 100%;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .metric {
            background: var(--bg);
            border-radius: 10px;
            padding: 0.75rem;
            text-align: center;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
        }

        .status.loading {
            display: block;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: var(--accent);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.5rem;
            display: none;
        }

        .progress-bar.active { display: block; }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            border-radius: 2px;
            transition: width 0.3s;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .file-info {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        #wasmStatus {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error);
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        #wasmStatus.loaded { background: var(--success); }
    </style>
</head>
<body>
    <h1>🧬 Crompressor</h1>
    <p class="subtitle">WebAssembly Compression Engine <span id="wasmStatus"></span></p>

    <div class="container">
        <!-- Codebook Upload -->
        <div class="card">
            <h2>📚 Codebook</h2>
            <div class="drop-zone" id="codebookDrop">
                <p>Drop .cromdb file here or click to select</p>
                <input type="file" id="codebookInput" accept=".cromdb">
            </div>
            <div class="file-info" id="codebookInfo" style="display:none">
                <span id="codebookName"></span>
                <span id="codebookSize"></span>
            </div>
        </div>

        <!-- File Input -->
        <div class="card">
            <h2>📄 Input File</h2>
            <div class="drop-zone" id="fileDrop">
                <p>Drop any file to compress, or a .crom file to decompress</p>
                <input type="file" id="fileInput">
            </div>
            <div class="file-info" id="fileInfo" style="display:none">
                <span id="fileName"></span>
                <span id="fileSize"></span>
            </div>
        </div>

        <!-- Actions -->
        <div class="card">
            <h2>⚡ Actions</h2>
            <button class="btn" id="btnPack" disabled>Compress (Pack)</button>
            <button class="btn" id="btnAnalyze" disabled style="background: linear-gradient(135deg, #06b6d4, #0891b2)">Analyze Entropy</button>

            <div class="progress-bar" id="progressBar">
                <div class="fill" style="width: 100%"></div>
            </div>

            <div class="status" id="status"></div>
        </div>

        <!-- Results -->
        <div class="card" id="resultsCard" style="display:none">
            <h2>📊 Results</h2>
            <div class="metrics" id="metrics"></div>
            <button class="btn" id="btnDownload" style="background: linear-gradient(135deg, #22c55e, #16a34a)">Download Result</button>
        </div>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        let codebookData = null;
        let fileData = null;
        let fileName = '';
        let resultData = null;

        // WASM Loading
        const go = new Go();
        const wasmStatus = document.getElementById('wasmStatus');

        WebAssembly.instantiateStreaming(fetch("crompressor.wasm"), go.importObject)
            .then(result => {
                go.run(result.instance);
                wasmStatus.classList.add('loaded');
                updateButtons();
            })
            .catch(err => {
                setStatus('WASM load failed: ' + err.message, 'error');
            });

        // Drop zones
        setupDropZone('codebookDrop', 'codebookInput', (data, name, size) => {
            codebookData = data;
            document.getElementById('codebookInfo').style.display = 'flex';
            document.getElementById('codebookName').textContent = name;
            document.getElementById('codebookSize').textContent = formatBytes(size);
            updateButtons();
        });

        setupDropZone('fileDrop', 'fileInput', (data, name, size) => {
            fileData = data;
            fileName = name;
            document.getElementById('fileInfo').style.display = 'flex';
            document.getElementById('fileName').textContent = name;
            document.getElementById('fileSize').textContent = formatBytes(size);
            updateButtons();
        });

        // Buttons
        document.getElementById('btnPack').onclick = () => {
            if (!fileData || !codebookData) return;
            setStatus('Compressing...', 'loading');
            document.getElementById('progressBar').classList.add('active');

            setTimeout(() => {
                try {
                    const result = cromPack(fileData, codebookData, 'archive');
                    if (result.error) {
                        setStatus(result.error, 'error');
                    } else {
                        resultData = result.data;
                        const m = result.metrics;
                        showMetrics({
                            'Original': formatBytes(m.originalSize),
                            'Packed': formatBytes(m.packedSize),
                            'Ratio': ((m.packedSize / m.originalSize) * 100).toFixed(1) + '%',
                            'Hit Rate': m.hitRate.toFixed(1) + '%',
                            'Chunks': m.totalChunks,
                            'Literals': m.literalChunks,
                            'Entropy': m.entropy.toFixed(2) + ' b/B',
                            'Time': m.durationMs + ' ms'
                        });
                        setStatus('Compression complete!', 'success');
                    }
                } catch (e) {
                    setStatus('Error: ' + e.message, 'error');
                }
                document.getElementById('progressBar').classList.remove('active');
            }, 50);
        };

        document.getElementById('btnAnalyze').onclick = () => {
            if (!fileData) return;
            try {
                const raw = cromAnalyze(fileData);
                const analysis = JSON.parse(raw);
                showMetrics({
                    'Entropy': analysis.entropy.toFixed(4) + ' b/B',
                    'Size': formatBytes(analysis.size),
                    'Classification': analysis.classification,
                    'Compressible': analysis.isLowEntropy ? 'Yes ✔' : 'No'
                });
                setStatus('Analysis complete!', 'success');
            } catch (e) {
                setStatus('Error: ' + e.message, 'error');
            }
        };

        document.getElementById('btnDownload').onclick = () => {
            if (!resultData) return;
            const blob = new Blob([resultData]);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName + '.crom';
            a.click();
            URL.revokeObjectURL(url);
        };

        // Helpers
        function setupDropZone(dropId, inputId, callback) {
            const drop = document.getElementById(dropId);
            const input = document.getElementById(inputId);

            drop.onclick = () => input.click();
            drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
            drop.ondragleave = () => drop.classList.remove('dragover');
            drop.ondrop = e => {
                e.preventDefault();
                drop.classList.remove('dragover');
                handleFile(e.dataTransfer.files[0], callback);
            };
            input.onchange = () => handleFile(input.files[0], callback);
        }

        function handleFile(file, callback) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => callback(new Uint8Array(reader.result), file.name, file.size);
            reader.readAsArrayBuffer(file);
        }

        function updateButtons() {
            const wasmReady = wasmStatus.classList.contains('loaded');
            document.getElementById('btnPack').disabled = !(wasmReady && fileData && codebookData);
            document.getElementById('btnAnalyze').disabled = !(wasmReady && fileData);
        }

        function setStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        function showMetrics(data) {
            const el = document.getElementById('metrics');
            el.innerHTML = Object.entries(data).map(([k, v]) =>
                `<div class="metric"><div class="metric-value">${v}</div><div class="metric-label">${k}</div></div>`
            ).join('');
            document.getElementById('resultsCard').style.display = 'block';
        }

        function formatBytes(b) {
            if (b === 0) return '0 B';
            const k = 1024, s = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(b) / Math.log(k));
            return (b / Math.pow(k, i)).toFixed(1) + ' ' + s[i];
        }
    </script>
</body>
</html>

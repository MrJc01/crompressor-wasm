name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout core engine
        uses: actions/checkout@v4
        with:
          repository: MrJc01/crompressor
          path: crompressor

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build WASM
        run: GOOS=js GOARCH=wasm go build -o crompressor.wasm ./cmd/wasm/

      - name: Check binary size
        run: ls -lh crompressor.wasm

      - name: Vet
        run: GOOS=js GOARCH=wasm go vet ./...
